[include mmu_klipperscreen.conf]
[preheat ABS]
bed = 115
extruder = 225

[preheat PLA]
bed = 70
extruder = 220

[preheat PETG]
bed = 75
extruder = 225

[preheat TPU]
bed = 70
extruder = 220

[printer hyper300]
extrude_distances: 10, 25, 50, 100
extrude_speeds: 2, 5, 10, 15


#в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ
#в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  
#в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•қ  
#в–Ҳв–Ҳв•‘     в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—
#в•ҡв•җв•қ      в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қ

[gcode_macro PURGA_MMU]
# ==========================================================
# MACRO: PURGA_MMU - VERSГғO COM PONTOS + RASPADOR
# ==========================================================
description: >
  Purga mecГўnica com servo/escova integrada, padrГЈo de pontos com raspador, wipe diagonal e opГ§ГЈo de retraГ§ГЈo.
  VerificaГ§ГЈo inteligente de cor na primeira purga para evitar desperdГӯcio.
  Velocidades de purga ajustadas automaticamente por material.
  DetecГ§ГЈo de troca de material com volume fixo para limpeza completa do bico.
  Purga realizada em pontos estacionГЎrios distribuГӯdos no eixo X central da bandeja.
  ApГіs cada ponto, movimento rГЎpido em X para o raspador quebrar o filamento.
  Limpeza diagonal cruzada na escova retangular.
  DivisГЈo automГЎtica de purgas grandes em 2 ciclos para esvaziar bandeja.
  Controle de ventilador durante a purga para resfriamento.
  
  PARГӮMETROS:
  вҖў VOLUME=<valor>    вҶ’ Volume de filamento a purgar em mmВі
  вҖў TESTE=<0|1|2>     вҶ’ Modo: 0=purga normal (extrusГЈo+servo), 1=sГі movimentos, 2=movimentos+servo
  вҖў DEBUG=<0|1>       вҶ’ Imprime cГЎlculos e posiГ§Гөes no console (0=off, 1=on)
  вҖў RETRACT=<valor>   вҶ’ RetraГ§ГЈo em mm apГіs purga (0=sem retraГ§ГЈo)
  вҖў ONLY_CLEAN=<0|1>  вҶ’ Apenas limpeza na escova (sem purga/retraГ§ГЈo, 0=off, 1=on)
gcode:
    RESPOND TYPE=command MSG="PURGA_MMU: Perfil SKEW descarregado antes da purga"
    SET_SKEW CLEAR=1
    
    # ParГўmetros de entrada
    {% set manual_volume = params.VOLUME|default(0)|float %}
    {% set teste_mode = params.TESTE|default(0)|int %}
    {% set debug = params.DEBUG|default(0)|int %}
    {% set manual_retract = params.RETRACT|default(-1)|float %}
    {% set only_clean = params.ONLY_CLEAN|default(0)|int %}
    
    # ===== CONFIGURAГҮГ•ES DA MACRO =====
    # Posicionamento da bandeja de purga (movimento retangular)
    {% set tray_x1 = 105 %}               # Coordenada X do canto 1 (inferior esquerdo)
    {% set tray_y1 = 322 %}               # Coordenada Y do canto 1 (inferior esquerdo)

    {% set tray_x2 = 128 %}               # Coordenada X do canto 2 (inferior direito)
    {% set tray_y2 = 322 %}               # Coordenada Y do canto 2 (inferior direito)

    {% set tray_x3 = 128 %}               # Coordenada X do canto 3 (superior direito)
    {% set tray_y3 = 332 %}               # Coordenada Y do canto 3 (superior direito)

    {% set tray_x4 = 105 %}               # Coordenada X do canto 4 (superior esquerdo)
    {% set tray_y4 = 332 %}               # Coordenada Y do canto 4 (superior esquerdo)

    {% set purge_z = 20 %}                # Altura Z segura para movimentos de purga

    # --- COORDENADAS DA ESCOVA RETANGULAR ---
    {% set brush_x1 = 105 %}  # Canto inferior esquerdo X
    {% set brush_y1 = 322 %}  # Canto inferior esquerdo Y

    {% set brush_x2 = 128 %}  # Canto inferior direito X
    {% set brush_y2 = 322 %}  # Canto inferior direito Y

    {% set brush_x3 = 128 %}  # Canto superior direito X
    {% set brush_y3 = 332 %}  # Canto superior direito Y
    
    {% set brush_x4 = 105 %}  # Canto superior esquerdo X
    {% set brush_y4 = 332 %}  # Canto superior esquerdo Y
    
    # Controle de volume e divisГЈo de purga
    {% set max_volume_per_cycle = 500 %}  # Volume mГЎximo (mmВі) antes de dividir em 2 ciclos
    {% set filament_diameter = 1.75 %}    # DiГўmetro do filamento em mm
    
    # --- CONFIGURAГҮГ•ES DOS PONTOS DE PURGA ---
    {% set purge_points = 5 %}            # NГәmero de pontos de purga no centro
    {% set scraper_x = 100 %}             # PosiГ§ГЈo X do raspador (fora da bandeja)
    {% set break_speed = 12000 %}         # Velocidade do movimento de quebra (mm/min)
    
    # Controle do ventilador durante purga
    {% set fan_speed = 0 %}             # Velocidade do fan (0-255). Se 0, nГЈo ativa o fan
    
    # RetraГ§ГЈo e limpeza
    {% set default_retract = 12 %}        # RetraГ§ГЈo padrГЈo em mm apГіs purga
    {% set brush_strokes = 3 %}           # NГәmero de passadas diagonais na escova
    {% set wipe_offset = 10 %}            # DistГўncia em mm para saГӯda lateral da escova
    
    # PosiГ§ГЈo segura (para nГЈo interferir no fechamento da bandeja)
    {% set safe_x = 245 %}                # Coordenada X da posiГ§ГЈo segura
    {% set safe_y = 300 %}                # Coordenada Y da posiГ§ГЈo segura
    
    # Volumes de purga inteligentes
    {% set first_purge_volume = 450 %}    # Volume (mmВі) para primeira purga (cor diferente)
    {% set same_color_margin = 2 %}       # Multiplicador para purga de mesma cor
    {% set material_change_purge_volume = 850 %}  # Volume (mmВі) fixo para troca de material
    {% set default_purge_volume = 100 %}  # Volume (mmВі) padrГЈo quando toolchange_purge_volume = 0
    

    
    # ===== VELOCIDADES DE PURGA POR MATERIAL =====
    {% set purge_speed_abs = 400 %}       # Velocidade de extrusГЈo para ABS (mm/min)
    {% set purge_speed_tpu = 150 %}       # Velocidade de extrusГЈo para TPU (mm/min)
    {% set purge_speed_pla = 400 %}       # Velocidade de extrusГЈo para PLA (mm/min)
    {% set purge_speed_hips = 400 %}      # Velocidade de extrusГЈo para HIPS (mm/min)
    {% set purge_speed_petg = 350 %}      # Velocidade de extrusГЈo para PETG (mm/min)
    {% set purge_speed_default = 400 %}   # Velocidade de extrusГЈo padrГЈo (mm/min)
    
    # ==========================================================
    # MODO ONLY_CLEAN: APENAS LIMPEZA (SEM PURGA/RETRAГҮГғO)
    # ==========================================================
    {% if only_clean %}
        RESPOND TYPE=command MSG="PURGA_MMU: *** MODO ONLY_CLEAN *** Apenas limpeza na escova"
        
        SAVE_GCODE_STATE NAME=PURGA_MMU_STATE
        
        # Garantir altura segura
        {% set current_z = printer.toolhead.position.z %}
        {% if current_z < purge_z %}
            G90
            G1 Z{purge_z} F3000
        {% endif %}
        
        # --- ATIVA VENTILADOR (se configurado) ---
        {% if fan_speed > 0 %}
            M106 S{fan_speed}
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador ativado - Velocidade: {fan_speed}/255"
        {% else %}
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador desativado (fan_speed=0)"
            M106 S{fan_speed}
        {% endif %}
        
        # --- ABRE BANDEJA ---
        {% if teste_mode != 1 %}
            PURGE_SERVO_OPEN
            G4 P500
            {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - Bandeja aberta" {% endif %}
        {% endif %}
        
        # --- LIMPEZA NA ESCOVA (MOVIMENTOS DIAGONAIS CRUZADOS) ---
        RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - Iniciando limpeza diagonal na escova"
        
        # Movimento inicial para o primeiro canto (inferior esquerdo)
        G90
        G1 X{brush_x1} Y{brush_y1} F6000
        {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - PosiГ§ГЈo inicial - Canto 1: X{brush_x1} Y{brush_y1}" {% endif %}
        
        # Zigue-zague diagonal cruzado
        {% for i in range(brush_strokes|int) %}
            {% if i % 2 == 0 %}
                # Diagonal ascendente: Canto 1 вҶ’ Canto 3 (esquerda-baixo вҶ’ direita-cima)
                G1 X{brush_x3} Y{brush_y3} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/A - Diagonal вҶ— (C1вҶ’C3)" {% endif %}
                # Move para Canto 2 (inferior direito)
                G1 X{brush_x2} Y{brush_y2} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/B - Move para C2" {% endif %}
                # Diagonal ascendente: Canto 2 вҶ’ Canto 4 (direita-baixo вҶ’ esquerda-cima)
                G1 X{brush_x4} Y{brush_y4} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/C - Diagonal вҶ– (C2вҶ’C4)" {% endif %}
                # Retorna para Canto 1
                G1 X{brush_x1} Y{brush_y1} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/D - Retorna C1" {% endif %}
            {% else %}
                # Diagonal descendente: Canto 4 вҶ’ Canto 2 (esquerda-cima вҶ’ direita-baixo)
                G1 X{brush_x4} Y{brush_y4} F3000
                G1 X{brush_x2} Y{brush_y2} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/A - Diagonal вҶҳ (C4вҶ’C2)" {% endif %}
                # Move para Canto 3 (superior direito)
                G1 X{brush_x3} Y{brush_y3} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/B - Move para C3" {% endif %}
                # Diagonal descendente: Canto 3 вҶ’ Canto 1 (direita-cima вҶ’ esquerda-baixo)
                G1 X{brush_x1} Y{brush_y1} F3000
                {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN Stroke {i+1}/C - Diagonal вҶҷ (C3вҶ’C1)" {% endif %}
            {% endif %}
        {% endfor %}
        
        # --- WIPE FINAL ---
        # Sai pela direita da escova (lateral, nГЈo para cima)
        {% set exit_x = brush_x3 + wipe_offset %}
        {% set exit_y = (brush_y3 + brush_y2) / 2 %}
        G90
        G1 X{exit_x} Y{exit_y} F3000
        {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - SaГӯda lateral - X{exit_x|round(1)} Y{exit_y|round(1)}" {% endif %}
        
        # --- SAFE POSITION (necessГЎrio antes de fechar bandeja) ---
        G1 X{safe_x} Y{safe_y} F7800
        {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - PosiГ§ГЈo segura alcanГ§ada" {% endif %}
        
        # --- DESATIVA VENTILADOR ---
        {% if fan_speed > 0 %}
            M107
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador desativado"
        {% endif %}
        
        # --- RECOLHE BANDEJA ---
        {% if teste_mode != 1 %}
            PURGE_SERVO_CLOSE
            G4 P500
            {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: ONLY_CLEAN - Bandeja fechada" {% endif %}
        {% endif %}
        
        RESTORE_GCODE_STATE NAME=PURGA_MMU_STATE
        RESPOND TYPE=command MSG="PURGA_MMU: вң“ ONLY_CLEAN concluГӯdo - Limpeza finalizada"
        
    {% else %}
        # ==========================================================
        # MODO NORMAL: PURGA COMPLETA COM LIMPEZA
        # ==========================================================
        
        # ===== DETECГҮГғO DE MATERIAL E VELOCIDADE =====
        {% set active_material = printer.mmu.active_filament.material|default("")|string|upper %}
        
        {% if active_material == "TPU" %}
            {% set purge_feed = purge_speed_tpu %}
        {% elif active_material == "ABS" %}
            {% set purge_feed = purge_speed_abs %}
        {% elif active_material == "PLA" %}
            {% set purge_feed = purge_speed_pla %}
        {% elif active_material == "HIPS" %}
            {% set purge_feed = purge_speed_hips %}
        {% elif active_material == "PETG" %}
            {% set purge_feed = purge_speed_petg %}
        {% else %}
            {% set purge_feed = purge_speed_default %}
        {% endif %}
        
        {% if active_material != "" %}
            RESPOND TYPE=command MSG="PURGA_MMU: Material detectado: {active_material} | Velocidade: {purge_feed} mm/min"
        {% else %}
            RESPOND TYPE=command MSG="PURGA_MMU: Material nГЈo detectado, usando velocidade padrГЈo: {purge_feed} mm/min"
        {% endif %}
        
        # ===== CONFIGURAГҮГғO DA RETRAГҮГғO =====
        {% set retract_after_purge = manual_retract if manual_retract >= 0 else default_retract %}
        
        # Mensagem sobre retraГ§ГЈo configurada
        {% if teste_mode == 0 %}
            {% if retract_after_purge > 0 %}
                RESPOND TYPE=command MSG="PURGA_MMU: RetraГ§ГЈo configurada: {retract_after_purge} mm"
            {% else %}
                RESPOND TYPE=command MSG="PURGA_MMU: ATENГҮГғO - RetraГ§ГЈo desabilitada (RETRACT=0)"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="PURGA_MMU: Modo teste {teste_mode} - RetraГ§ГЈo nГЈo serГЎ executada"
        {% endif %}
        
        # Obter nГәmero de trocas de ferramenta
        {% set num_toolchanges = printer.mmu.num_toolchanges|default(0)|int %}
        
        # ===== DETECГҮГғO DE TROCA DE MATERIAL =====
        {% set material_changed = false %}
        {% set last_material = "" %}
        
        {% if num_toolchanges == 0 %}
            # PRIMEIRA TROCA: usar save_variables
            {% set last_material = printer.save_variables.variables.last_tool_material|default("")|string|upper %}
            
            {% if last_material != "" and active_material != "" and last_material != active_material %}
                {% set material_changed = true %}
            {% endif %}
            
            {% if debug %}
                RESPOND TYPE=command MSG="PURGA_MMU: [PRIMEIRA TROCA] Material anterior (save_variables): '{last_material}'"
                RESPOND TYPE=command MSG="PURGA_MMU: [PRIMEIRA TROCA] Material atual: '{active_material}' | Troca: {material_changed}"
            {% endif %}
        {% else %}
            # DEMAIS TROCAS: usar printer.mmu.last_tool e printer.mmu.gate_material
            {% set last_tool = printer.mmu.last_tool|default(-1)|int %}
            
            {% if last_tool >= 0 %}
                {% set last_material = printer.mmu.gate_material[last_tool]|default("")|string|upper %}
                
                {% if last_material != "" and active_material != "" and last_material != active_material %}
                    {% set material_changed = true %}
                {% endif %}
                
                {% if debug %}
                    RESPOND TYPE=command MSG="PURGA_MMU: [DEMAIS TROCAS] Last tool: T{last_tool}"
                    RESPOND TYPE=command MSG="PURGA_MMU: [DEMAIS TROCAS] Material anterior (gate_material[{last_tool}]): '{last_material}'"
                    RESPOND TYPE=command MSG="PURGA_MMU: [DEMAIS TROCAS] Material atual: '{active_material}' | Troca: {material_changed}"
                {% endif %}
            {% else %}
                {% if debug %}
                    RESPOND TYPE=command MSG="PURGA_MMU: [DEMAIS TROCAS] Last tool invГЎlido ({last_tool}), sem detecГ§ГЈo de troca"
                {% endif %}
            {% endif %}
        {% endif %}
        
        # ===== LГ“GICA DE DETERMINAГҮГғO DO VOLUME DE PURGA =====
        {% if manual_volume > 0 %}
            {% set purge_volume = manual_volume %}
            {% set volume_source = "manual" %}
            
        {% elif material_changed %}
            {% set purge_volume = material_change_purge_volume %}
            {% set volume_source = "troca_material" %}
            
            RESPOND TYPE=command MSG="PURGA_MMU: *** TROCA DE MATERIAL DETECTADA ***"
            RESPOND TYPE=command MSG="PURGA_MMU: {last_material} вҶ’ {active_material}"
            RESPOND TYPE=command MSG="PURGA_MMU: Volume fixo para limpeza: {purge_volume|round(1)}mmВі"
            RESPOND TYPE=command MSG="PURGA_MMU: (Ignorando mapa de purga e verificaГ§ГЈo de cor)"
            
        {% elif num_toolchanges == 0 %}
            # PRIMEIRA PURGA - VERIFICAR CORES
            {% set last_color = printer.save_variables.variables.last_tool_color|default("")|string %}
            {% set remaining_length = printer.save_variables.variables.last_tool_filament_remaining|default(0)|float %}
            {% set active_color = printer.mmu.active_filament.color|default("")|string %}
            
            {% if debug %}
                RESPOND TYPE=command MSG="PURGA_MMU: Cor anterior (save_variables): '{last_color}' | Comprimento restante: {remaining_length}mm"
                RESPOND TYPE=command MSG="PURGA_MMU: Cor atual (MMU): '{active_color}'"
            {% endif %}
            
            # Verificar se temos dados de cor vГЎlidos (strings nГЈo vazias)
            {% if last_color != "" and active_color != "" %}
                # Ambas as cores estГЈo disponГӯveis - comparar
                {% if last_color|lower == active_color|lower %}
                    # MESMA COR DETECTADA
                    {% if remaining_length > 0 %}
                        {% set optimized_length = remaining_length * same_color_margin %}
                        {% set filament_area = 3.1416 * (filament_diameter/2)**2 %}
                        {% set purge_volume = optimized_length * filament_area %}
                        {% set volume_source = "mesma_cor_otimizada" %}
                        
                        RESPOND TYPE=command MSG="PURGA_MMU: *** MESMA COR DETECTADA *** Filamento restante: {remaining_length|round(1)}mm"
                        RESPOND TYPE=command MSG="PURGA_MMU: Cores: {last_color} = {active_color}"
                        RESPOND TYPE=command MSG="PURGA_MMU: Volume otimizado: {purge_volume|round(1)}mmВі"
                    {% else %}
                        {% set purge_volume = first_purge_volume %}
                        {% set volume_source = "primeira_purga_fallback" %}
                        RESPOND TYPE=command MSG="PURGA_MMU: Mesma cor detectada, mas sem dados de comprimento vГЎlidos. Usando volume padrГЈo."
                    {% endif %}
                {% else %}
                    # CORES DIFERENTES
                    {% set purge_volume = first_purge_volume %}
                    {% set volume_source = "primeira_purga_cor_diferente" %}
                    
                    RESPOND TYPE=command MSG="PURGA_MMU: *** PRIMEIRA PURGA *** Cores diferentes detectadas:"
                    RESPOND TYPE=command MSG="PURGA_MMU: Anterior: {last_color} вү  Atual: {active_color}"
                    RESPOND TYPE=command MSG="PURGA_MMU: Volume padrГЈo: {purge_volume|round(1)}mmВі"
                {% endif %}
            {% else %}
                # DADOS DE COR INDISPONГҚVEIS
                {% set purge_volume = first_purge_volume %}
                {% set volume_source = "primeira_purga_sem_dados" %}
                
                RESPOND TYPE=command MSG="PURGA_MMU: *** PRIMEIRA PURGA *** Dados de cor indisponГӯveis. Volume padrГЈo: {purge_volume|round(1)}mmВі"
                {% if last_color == "" %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вҶ’ Cor anterior nГЈo disponГӯvel no save_variables"
                {% endif %}
                {% if active_color == "" %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вҶ’ Cor atual nГЈo disponГӯvel no MMU"
                {% endif %}
            {% endif %}
        {% else %}
            {% set purge_vol_from_mmu = printer.mmu.toolchange_purge_volume|default(0)|float %}
            {% if purge_vol_from_mmu > 0 %}
                {% set purge_volume = purge_vol_from_mmu %}
                {% set volume_source = "normal" %}
            {% else %}
                {% set purge_volume = default_purge_volume %}
                {% set volume_source = "default_fallback" %}
                RESPOND TYPE=command MSG="PURGA_MMU: вҡ пёҸ toolchange_purge_volume = 0, usando volume padrГЈo: {default_purge_volume}mmВі"
            {% endif %}
        {% endif %}

        # ===== VERIFICAГҮГғO DE DIVISГғO DE PURGA =====
        {% set needs_split = purge_volume > max_volume_per_cycle %}
        {% set num_purge_cycles = 2 if needs_split else 1 %}
        {% set volume_per_cycle = (purge_volume / 2) if needs_split else purge_volume %}
        
        {% if needs_split %}
            RESPOND TYPE=command MSG="PURGA_MMU: вҡ пёҸ Volume grande detectado ({purge_volume|round(1)}mmВі > {max_volume_per_cycle}mmВі)"
            RESPOND TYPE=command MSG="PURGA_MMU: рҹ”„ Dividindo em 2 ciclos completos de {volume_per_cycle|round(1)}mmВі cada"
        {% endif %}

        {% set filament_area = 3.1416 * (filament_diameter/2)**2 %}

        {% if num_toolchanges == 0 %}
            RESPOND TYPE=command MSG="PURGA_MMU: *** PRIMEIRA PURGA *** - Trocas: {num_toolchanges} | Volume total: {purge_volume|round(1)} mmВі | Fonte: {volume_source}"
        {% endif %}

        RESPOND TYPE=command MSG="PURGA_MMU: Purga: {purge_volume|round(1)} mmВі total | Ciclos: {num_purge_cycles} | TESTE={teste_mode} | DEBUG={debug} | Fonte: {volume_source}"
        
        # Calcular centro Y da bandeja e espaГ§amento dos pontos
        {% set center_y = (tray_y1 + tray_y3) / 2 %}
        {% set point_spacing = (tray_x2 - tray_x1) / (purge_points - 1) if purge_points > 1 else 0 %}
        
        {% if debug %}
          RESPOND TYPE=command MSG="PURGA_MMU: Trocas de ferramenta: {num_toolchanges}"
          RESPOND TYPE=command MSG="PURGA_MMU: Material ativo: {active_material}"
          RESPOND TYPE=command MSG="PURGA_MMU: Velocidade de purga: {purge_feed} mm/min"
          RESPOND TYPE=command MSG="PURGA_MMU: Velocidade do ventilador: {fan_speed}/255"
          RESPOND TYPE=command MSG="PURGA_MMU: Bandeja: C1({tray_x1},{tray_y1}) C2({tray_x2},{tray_y2}) C3({tray_x3},{tray_y3}) C4({tray_x4},{tray_y4})"
          RESPOND TYPE=command MSG="PURGA_MMU: ГҒrea escova: C1({brush_x1},{brush_y1}) C2({brush_x2},{brush_y2}) C3({brush_x3},{brush_y3}) C4({brush_x4},{brush_y4})"
          RESPOND TYPE=command MSG="PURGA_MMU: Pontos de purga: {purge_points} pontos em Y={center_y|round(1)}, espaГ§amento X: {point_spacing|round(2)}mm"
          RESPOND TYPE=command MSG="PURGA_MMU: Raspador em X={scraper_x} | Velocidade quebra: {break_speed}mm/min"
          RESPOND TYPE=command MSG="PURGA_MMU: Passadas de limpeza diagonal: {brush_strokes}"
          RESPOND TYPE=command MSG="PURGA_MMU: RetraГ§ГЈo apГіs purga: {retract_after_purge} mm"
          RESPOND TYPE=command MSG="PURGA_MMU: Necessita divisГЈo: {needs_split} | Ciclos principais: {num_purge_cycles}"
        {% endif %}

        SAVE_GCODE_STATE NAME=PURGA_MMU_STATE

        {% set current_z = printer.toolhead.position.z %}
        {% if current_z < purge_z %}
          G90
          G1 Z{purge_z} F3000
        {% endif %}

        # --- ATIVA VENTILADOR (se configurado) ---
        {% if fan_speed > 0 %}
            M106 S{fan_speed}
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador ativado - Velocidade: {fan_speed}/255"
        {% else %}
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador desativado (fan_speed=0)"
        {% endif %}

        # ==========================================================
        # INГҚCIO DOS CICLOS DE PURGA
        # ==========================================================
        {% for main_cycle in range(num_purge_cycles) %}
            {% set cycle_num = main_cycle + 1 %}
            {% set purge_length = volume_per_cycle / filament_area %}
            
            {% if num_purge_cycles > 1 %}
                RESPOND TYPE=command MSG="PURGA_MMU: в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
                RESPOND TYPE=command MSG="PURGA_MMU: рҹ”„ CICLO {cycle_num}/2 - Volume: {volume_per_cycle|round(1)}mmВі ({purge_length|round(1)}mm)"
                RESPOND TYPE=command MSG="PURGA_MMU: в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ"
            {% endif %}

            # --- ABRE BANDEJA ---
            {% if teste_mode != 1 %}
              PURGE_SERVO_OPEN
              G4 P500
              {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Bandeja aberta" {% endif %}
            {% endif %}

            # --- PURGA NA BANDEJA (PONTOS + RASPADOR) ---
            G90  # Modo absoluto para XY
            M83  # Modo relativo para extrusГЈo
            MMU_SYNC_GEAR_MOTOR SYNC=1

            {% if teste_mode == 0 %}
              # ===== PURGA COM PONTOS ESTACIONГҒRIOS + MOVIMENTO PARA RASPADOR =====
              
              # Calcular extrusГЈo por ponto
              {% set length_per_point = purge_length / purge_points %}
              
              {% if debug %}
                RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Purga total: {purge_length|round(2)}mm em {purge_points} pontos"
                RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - ExtrusГЈo por ponto: {length_per_point|round(2)}mm"
                RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Pontos em Y={center_y|round(1)}, espaГ§amento X: {point_spacing|round(2)}mm"
                RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Raspador em X={scraper_x}, velocidade: {break_speed}mm/min"
              {% endif %}
              
              RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Iniciando {purge_points} pontos de purga"
              
              {% for p in range(purge_points|int) %}
                # Calcular posiГ§ГЈo X do ponto atual (esquerda para direita)
                {% set point_x = tray_x1 + (p * point_spacing) %}
                
                # Mover para o ponto de purga
                G1 X{point_x} Y{center_y} F7800
                
                {% if debug %}
                  RESPOND TYPE=command MSG="PURGA_MMU: Ponto {p+1}/{purge_points} - PosiГ§ГЈo X{point_x|round(1)} Y{center_y|round(1)}"
                {% endif %}
                
                # Purgar no ponto estacionГЎrio
                G1 E{length_per_point|round(4)} F{purge_feed}
                
                # Pequena pausa para formar a "bola"
                G4 P500
                
                # Movimento rГЎpido para o raspador (quebra o filamento)
                #G1 X{scraper_x} F{break_speed}
                
                {% if debug %}
                  RESPOND TYPE=command MSG="PURGA_MMU: Ponto {p+1}/{purge_points} - Raspador acionado em X{scraper_x}"
                {% endif %}
                
                G4 P100  # Pequena pausa apГіs quebra
              {% endfor %}
              
              RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Purga concluГӯda ({purge_points} bolas)"
              
              # ===== RETRAГҮГғO APГ“S PURGA =====
              {% if retract_after_purge|float > 0 %}
                RESPOND TYPE=command MSG="PURGA_MMU: >>> Ciclo {cycle_num} - Executando retraГ§ГЈo de {retract_after_purge} mm <<<"
                G1 E-{retract_after_purge|float} F2400
                G4 P100  # Pequena pausa para garantir execuГ§ГЈo
                RESPOND TYPE=command MSG="PURGA_MMU: >>> Ciclo {cycle_num} - RetraГ§ГЈo concluГӯda <<<"
              {% else %}
                RESPOND TYPE=command MSG="PURGA_MMU: >>> ATENГҮГғO: RetraГ§ГЈo pulada (valor: {retract_after_purge}) <<<"
              {% endif %}
              
            {% else %}
              # Modo teste - movimento sem extrusГЈo
              RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Modo teste {teste_mode} - Pontos + raspador sem extrusГЈo"
              
              {% for p in range(purge_points|int) %}
                {% set point_x = tray_x1 + (p * point_spacing) %}
                
                # Mover para o ponto
                G1 X{point_x} Y{center_y} F7800
                RESPOND TYPE=command MSG="PURGA_MMU: Teste ponto {p+1}/{purge_points} - X{point_x|round(1)} Y{center_y|round(1)}"
                
                G4 P300  # Simula tempo de purga
                
                # Movimento para raspador
                G1 X{scraper_x} F{break_speed}
                RESPOND TYPE=command MSG="PURGA_MMU: Teste ponto {p+1}/{purge_points} - Raspador X{scraper_x}"
                
                G4 P100
              {% endfor %}
            {% endif %}

            # --- LIMPEZA NA ESCOVA (MOVIMENTOS DIAGONAIS CRUZADOS) ---
            RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Iniciando limpeza diagonal na escova"
            
            # Movimento inicial para o primeiro canto (inferior esquerdo)
            G90
            G1 X{brush_x1} Y{brush_y1} F6000
            {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - PosiГ§ГЈo inicial - Canto 1: X{brush_x1} Y{brush_y1}" {% endif %}
            
            # Zigue-zague diagonal cruzado
            {% for i in range(brush_strokes|int) %}
                {% if i % 2 == 0 %}
                    # Diagonal ascendente: Canto 1 вҶ’ Canto 3 (esquerda-baixo вҶ’ direita-cima)
                    G1 X{brush_x3} Y{brush_y3} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/A - Diagonal вҶ— (C1вҶ’C3)" {% endif %}
                    # Move para Canto 2 (inferior direito)
                    G1 X{brush_x2} Y{brush_y2} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/B - Move para C2" {% endif %}
                    # Diagonal ascendente: Canto 2 вҶ’ Canto 4 (direita-baixo вҶ’ esquerda-cima)
                    G1 X{brush_x4} Y{brush_y4} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/C - Diagonal вҶ– (C2вҶ’C4)" {% endif %}
                    # Retorna para Canto 1
                    G1 X{brush_x1} Y{brush_y1} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/D - Retorna C1" {% endif %}
                {% else %}
                    # Diagonal descendente: Canto 4 вҶ’ Canto 2 (esquerda-cima вҶ’ direita-baixo)
                    G1 X{brush_x4} Y{brush_y4} F3000
                    G1 X{brush_x2} Y{brush_y2} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/A - Diagonal вҶҳ (C4вҶ’C2)" {% endif %}
                    # Move para Canto 3 (superior direito)
                    G1 X{brush_x3} Y{brush_y3} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/B - Move para C3" {% endif %}
                    # Diagonal descendente: Canto 3 вҶ’ Canto 1 (direita-cima вҶ’ esquerda-baixo)
                    G1 X{brush_x1} Y{brush_y1} F3000
                    {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} Stroke {i+1}/C - Diagonal вҶҷ (C3вҶ’C1)" {% endif %}
                {% endif %}
            {% endfor %}

            # --- WIPE FINAL ---
            # Sai pela direita da escova (lateral, nГЈo para cima)
            {% set exit_x = brush_x3 + wipe_offset %}
            {% set exit_y = (brush_y3 + brush_y2) / 2 %}
            G90
            G1 X{exit_x} Y{exit_y} F3000
            {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - SaГӯda lateral - X{exit_x|round(1)} Y{exit_y|round(1)}" {% endif %}

            # --- SAFE POSITION (necessГЎrio antes de fechar bandeja) ---
            G1 X{safe_x} Y{safe_y} F7800
            {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - PosiГ§ГЈo segura alcanГ§ada" {% endif %}

            # --- RECOLHE BANDEJA (esvazia o balde) ---
            {% if teste_mode != 1 %}
              PURGE_SERVO_CLOSE
              G4 P500
              {% if debug %} RESPOND TYPE=command MSG="PURGA_MMU: Ciclo {cycle_num} - Bandeja fechada (balde esvaziado)" {% endif %}
            {% endif %}
            
            {% if num_purge_cycles > 1 %}
                RESPOND TYPE=command MSG="PURGA_MMU: вң“ Ciclo {cycle_num}/2 concluГӯdo"
                {% if cycle_num < num_purge_cycles %}
                    G4 P1000  # Pausa entre ciclos para garantir estabilidade
                {% endif %}
            {% endif %}
        {% endfor %}
        # ==========================================================
        # FIM DOS CICLOS DE PURGA
        # ==========================================================

        # --- DESATIVA VENTILADOR ---
        {% if fan_speed > 0 %}
            M107
            RESPOND TYPE=command MSG="PURGA_MMU: Ventilador desativado"
        {% endif %}

        RESTORE_GCODE_STATE NAME=PURGA_MMU_STATE

        #Verifica se o perfil SKEW deve ser carregado. 
        {% set skew_enabled = printer.save_variables.variables.skew_enabled|default(1)|int %}
        {% if skew_enabled == 1 %}
            RESPOND TYPE=command MSG="рҹҹў PURGA_MMU: Perfil SKEW carregado apГіs a purga"
            SKEW_PROFILE LOAD=my_skew_profile
        {% else %}
            RESPOND TYPE=command MSG="рҹ”ҙ PURGA_MMU: Perfil SKEW carregado nГЈo carregado"
        {% endif %}
        
        #Salva os dados do filamento atual
        SAVE_ACTIVE_TOOL_INFO
        
        # Mensagem final de confirmaГ§ГЈo
        {% if teste_mode == 0 %}
            {% if retract_after_purge > 0 %}
                {% if num_purge_cycles > 1 %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вң“ {num_purge_cycles} ciclos de purga e retraГ§ГЈo concluГӯdos com sucesso"
                {% else %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вң“ Purga e retraГ§ГЈo concluГӯdas com sucesso"
                {% endif %}
            {% else %}
                {% if num_purge_cycles > 1 %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вң“ {num_purge_cycles} ciclos de purga concluГӯdos (sem retraГ§ГЈo)"
                {% else %}
                    RESPOND TYPE=command MSG="PURGA_MMU: вң“ Purga concluГӯda (sem retraГ§ГЈo)"
                {% endif %}
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="PURGA_MMU: вң“ Teste de movimentos concluГӯdo ({num_purge_cycles} ciclo(s))"
        {% endif %}
    {% endif %}



    
# в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— 
#в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—
#в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘
# в•ҡв•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•— в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘
#в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘  в•ҡв–Ҳв–Ҳв•”в•қ  в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ
#в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ    в•ҡв•җв•җв•җв•җв•қ 
[gcode_macro PURGE_SERVO]
description: Controla servo de purge com seguranГ§a. Uso: PURGE_SERVO POS=OPEN ou POS=CLOSE. Sem parГўmetros mostra status e configuraГ§Гөes.
variable_min_z_height: 19.0    # Altura MГҚNIMA necessГЎria para abrir o servo (em mm)
variable_open_angle: 4        # ГӮngulo para posiГ§ГЈo aberta
variable_closed_angle: 110       # ГӮngulo para posiГ§ГЈo fechada
variable_last_position: "UNKNOWN"  # Гҡltima posiГ§ГЈo conhecida do servo (volГЎtil)
gcode:
    # ObtГ©m as variГЎveis configuradas
    {% set min_z = printer["gcode_macro PURGE_SERVO"].min_z_height %}
    {% set open_angle = printer["gcode_macro PURGE_SERVO"].open_angle %}
    {% set closed_angle = printer["gcode_macro PURGE_SERVO"].closed_angle %}
    {% set last_pos = printer["gcode_macro PURGE_SERVO"].last_position %}
    
    # Se nГЈo foi passado parГўmetro POS, mostra status e configuraГ§Гөes
    {% if not params.POS %}
        RESPOND TYPE=command MSG="PURGE_SERVO: === STATUS PURGE SERVO ==="
        {% if last_pos == "OPEN" %}
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў PosiГ§ГЈo atual: ABERTO (Гўngulo: {open_angle}В°)"
        {% elif last_pos == "CLOSED" %}
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў PosiГ§ГЈo atual: FECHADO (Гўngulo: {closed_angle}В°)"
        {% else %}
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў PosiГ§ГЈo atual: Desconhecida (servo nГЈo foi usado nesta sessГЈo)"
        {% endif %}
        RESPOND TYPE=command MSG="PURGE_SERVO: вҖў ГӮngulo aberto: {open_angle}В°"
        RESPOND TYPE=command MSG="PURGE_SERVO: вҖў ГӮngulo fechado: {closed_angle}В°"
        {% set min_z_str = "%.1f"|format(min_z) %}
        RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Altura mГӯnima para abrir: {min_z_str}mm"
        {% if 'xyz' in printer.toolhead.homed_axes %}
            {% set current_z = "%.1f"|format(printer.toolhead.position.z) %}
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Altura atual da mesa: {current_z}mm"
            {% if printer.toolhead.position.z >= min_z %}
                RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Status: Mesa na altura segura para abertura"
            {% else %}
                RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Status: Mesa muito baixa para abertura"
            {% endif %}
        {% else %}
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Altura atual da mesa: Eixos nГЈo homeados"
            RESPOND TYPE=command MSG="PURGE_SERVO: вҖў Status: Eixos precisam ser homeados"
        {% endif %}
        RESPOND TYPE=command MSG="PURGE_SERVO: === USO: PURGE_SERVO POS=OPEN ou POS=CLOSE ==="
    {% else %}
        {% set position = params.POS|upper %}
        {% if position == 'OPEN' %}
            # Verifica se os eixos estГЈo homeados
            {% if not 'xyz' in printer.toolhead.homed_axes %}
                RESPOND TYPE=command MSG="PURGE_SERVO: ERRO: Eixos nГЈo estГЈo homeados! Execute G28 antes de abrir o servo."
            # Verifica se a mesa estГЎ na altura mГӯnima
            {% elif printer.toolhead.position.z < min_z %}
                {% set current_z = "%.1f"|format(printer.toolhead.position.z) %}
                {% set min_z_str = "%.1f"|format(min_z) %}
                RESPOND TYPE=command MSG="PURGE_SERVO: ERRO: Mesa muito baixa! Altura atual: {current_z}mm. Altura mГӯnima necessГЎria: {min_z_str}mm"
            # Tudo OK, pode abrir
            {% else %}
                {% set current_z = "%.1f"|format(printer.toolhead.position.z) %}
                SET_SERVO SERVO=purge_servo ANGLE={open_angle}
                SET_GCODE_VARIABLE MACRO=PURGE_SERVO VARIABLE=last_position VALUE='"OPEN"'
                RESPOND TYPE=command MSG="PURGE_SERVO: Servo purge ABERTO - Altura: {current_z}mm (Гўngulo: {open_angle}В°)"
            {% endif %}
        {% elif position == 'CLOSE' %}
            SET_SERVO SERVO=purge_servo ANGLE={closed_angle}
            SET_GCODE_VARIABLE MACRO=PURGE_SERVO VARIABLE=last_position VALUE='"CLOSED"'
            RESPOND TYPE=command MSG="PURGE_SERVO: Servo purge FECHADO (Гўngulo: {closed_angle}В°)"
        {% else %}
            RESPOND TYPE=command MSG="PURGE_SERVO: ERRO: PosiГ§ГЈo invГЎlida! Use: POS=OPEN ou POS=CLOSE"
        {% endif %}
    {% endif %}

# Macros simplificadas para uso rГЎpido
[gcode_macro PURGE_SERVO_OPEN]
description: Abre o servo de purge (com verificaГ§Гөes de seguranГ§a)
gcode:
    PURGE_SERVO POS=OPEN

[gcode_macro PURGE_SERVO_CLOSE]
description: Fecha o servo de purge
gcode:
    PURGE_SERVO POS=CLOSE

# Macro para alterar configuraГ§Гөes sem reiniciar
[gcode_macro SET_PURGE_SERVO_CONFIG]
description: Configura parГўmetros do servo purge
gcode:
    {% if params.MIN_Z %}
        SET_GCODE_VARIABLE MACRO=PURGE_SERVO VARIABLE=min_z_height VALUE={params.MIN_Z|float}
        RESPOND TYPE=command MSG="PURGE_SERVO: Altura mГӯnima alterada para: {params.MIN_Z}mm"
    {% endif %}
    
    {% if params.OPEN_ANGLE %}
        SET_GCODE_VARIABLE MACRO=PURGE_SERVO VARIABLE=open_angle VALUE={params.OPEN_ANGLE|int}
        RESPOND TYPE=command MSG="PURGE_SERVO: ГӮngulo de abertura alterado para: {params.OPEN_ANGLE}В°"
    {% endif %}
    
    {% if params.CLOSED_ANGLE %}
        SET_GCODE_VARIABLE MACRO=PURGE_SERVO VARIABLE=closed_angle VALUE={params.CLOSED_ANGLE|int}
        RESPOND TYPE=command MSG="PURGE_SERVO: ГӮngulo de fechamento alterado para: {params.CLOSED_ANGLE}В°"
    {% endif %}
    
    {% if not params.MIN_Z and not params.OPEN_ANGLE and not params.CLOSED_ANGLE %}
        {% set min_z = printer["gcode_macro PURGE_SERVO"].min_z_height %}
        {% set open_angle = printer["gcode_macro PURGE_SERVO"].open_angle %}
        {% set closed_angle = printer["gcode_macro PURGE_SERVO"].closed_angle %}
        RESPOND TYPE=command MSG="PURGE_SERVO: ConfiguraГ§ГЈo atual: MIN_Z={min_z}mm, OPEN_ANGLE={open_angle}В°, CLOSED_ANGLE={closed_angle}В°"
    {% endif %}
#####################################################################
#  SILENT MODE - StealthChop / SpreadCycle Toggle
#####################################################################
#
#  Uso: SILENT_MODE [MODE=stealth|spread] [FORCE=0|1]
#
#  Exemplos:
#    SILENT_MODE              - Alterna entre os modos
#    SILENT_MODE MODE=stealth - Força StealthChop
#    SILENT_MODE MODE=spread  - Força SpreadCycle
#    SILENT_MODE FORCE=1      - Alterna mesmo durante impressão (sem pause)
#
#  Requer: [save_variables] configurado no printer.cfg
#
#####################################################################

# Adicione isso ao seu printer.cfg se ainda não tiver:
# [save_variables]
# filename: ~/printer_data/config/variables.cfg

#####################################################################
#  MACRO PRINCIPAL
#####################################################################

[gcode_macro SILENT_MODE]
description: Alterna entre StealthChop (silencioso) e SpreadCycle (performance)
variable_current_mode: "stealth"  # Valor padrão inicial
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set mode = params.MODE|default("")|lower %}
    {% set force = params.FORCE|default(0)|int %}
    
    # Recupera o modo salvo ou usa o padrão
    {% set saved_mode = svv.silent_mode|default("stealth") %}
    {% set current = saved_mode %}
    
    # Determina o novo modo
    {% if mode == "stealth" %}
        {% set new_mode = "stealth" %}
    {% elif mode == "spread" %}
        {% set new_mode = "spread" %}
    {% else %}
        # Toggle: alterna para o modo oposto
        {% if current == "stealth" %}
            {% set new_mode = "spread" %}
        {% else %}
            {% set new_mode = "stealth" %}
        {% endif %}
    {% endif %}
    
    # Verifica se precisa mudar
    {% if new_mode == current and mode == "" %}
        {action_respond_info("Modo atual já é: %s" % current|upper)}
    {% else %}
        # Verifica se está imprimindo
        {% set is_printing = printer.idle_timeout.state == "Printing" %}
        {% set was_paused = False %}
        
        {% if is_printing and force == 0 %}
            {action_respond_info("Impressão detectada. Pausando para alterar modo...")}
            PAUSE
            # Pequeno delay para garantir que a pausa foi efetivada
            G4 P1000
            {% set was_paused = True %}
        {% endif %}
        
        # Aplica o novo modo
        _APPLY_TMC_MODE MODE={new_mode}
        
        # Salva de forma persistente
        SAVE_VARIABLE VARIABLE=silent_mode VALUE='"{new_mode}"'
        SET_GCODE_VARIABLE MACRO=SILENT_MODE VARIABLE=current_mode VALUE='"{new_mode}"'
        
        # Feedback
        {% if new_mode == "stealth" %}
            {action_respond_info("✓ Modo SILENCIOSO (StealthChop) ativado")}
        {% else %}
            {action_respond_info("✓ Modo PERFORMANCE (SpreadCycle) ativado")}
        {% endif %}
        
        # Retoma se estava imprimindo
        {% if is_printing and force == 0 %}
            {action_respond_info("Retomando impressão...")}
            G4 P500
            RESUME
        {% endif %}
    {% endif %}

#####################################################################
#  MACRO AUXILIAR - APLICA MODO NOS DRIVERS TMC
#####################################################################

[gcode_macro _APPLY_TMC_MODE]
description: Aplica o modo nos drivers TMC (interno)
gcode:
    {% set mode = params.MODE|default("stealth")|lower %}
    
    # =========================================================
    # CONFIGURAÇÃO: Ajuste conforme seus drivers
    # =========================================================
    # Para TMC5160: en_pwm_mode (1=StealthChop, 0=SpreadCycle)
    # Para TMC2209: en_spreadcycle (0=StealthChop, 1=SpreadCycle)
    # =========================================================
    
    {% if mode == "stealth" %}
        # --- TMC5160 ---
        SET_TMC_FIELD STEPPER=stepper_x FIELD=en_pwm_mode VALUE=1
        SET_TMC_FIELD STEPPER=stepper_y FIELD=en_pwm_mode VALUE=1
        #SET_TMC_FIELD STEPPER=stepper_z FIELD=en_pwm_mode VALUE=1
        # SET_TMC_FIELD STEPPER=stepper_z1 FIELD=en_pwm_mode VALUE=1  # Descomente se tiver
        # SET_TMC_FIELD STEPPER=stepper_z2 FIELD=en_pwm_mode VALUE=1  # Descomente se tiver
        # SET_TMC_FIELD STEPPER=stepper_z3 FIELD=en_pwm_mode VALUE=1  # Descomente se tiver
        
        # --- TMC2209 (descomente se usar 2209) ---
        # SET_TMC_FIELD STEPPER=stepper_x FIELD=en_spreadcycle VALUE=0
        # SET_TMC_FIELD STEPPER=stepper_y FIELD=en_spreadcycle VALUE=0
        # SET_TMC_FIELD STEPPER=stepper_z FIELD=en_spreadcycle VALUE=0
        
    {% else %}
        # --- TMC5160 ---
        SET_TMC_FIELD STEPPER=stepper_x FIELD=en_pwm_mode VALUE=0
        SET_TMC_FIELD STEPPER=stepper_y FIELD=en_pwm_mode VALUE=0
        #SET_TMC_FIELD STEPPER=stepper_z FIELD=en_pwm_mode VALUE=0
        # SET_TMC_FIELD STEPPER=stepper_z1 FIELD=en_pwm_mode VALUE=0  # Descomente se tiver
        # SET_TMC_FIELD STEPPER=stepper_z2 FIELD=en_pwm_mode VALUE=0  # Descomente se tiver
        # SET_TMC_FIELD STEPPER=stepper_z3 FIELD=en_pwm_mode VALUE=0  # Descomente se tiver
        
        # --- TMC2209 (descomente se usar 2209) ---
        # SET_TMC_FIELD STEPPER=stepper_x FIELD=en_spreadcycle VALUE=1
        # SET_TMC_FIELD STEPPER=stepper_y FIELD=en_spreadcycle VALUE=1
        # SET_TMC_FIELD STEPPER=stepper_z FIELD=en_spreadcycle VALUE=1
    {% endif %}

#####################################################################
#  RESTAURAÇÃO AUTOMÁTICA AO INICIAR
#####################################################################

[delayed_gcode _RESTORE_SILENT_MODE]
initial_duration: 3  # Executa 3 segundos após o Klipper iniciar
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set saved_mode = svv.silent_mode|default("stealth") %}
    
    {action_respond_info("Restaurando modo: %s" % saved_mode|upper)}
    _APPLY_TMC_MODE MODE={saved_mode}
    SET_GCODE_VARIABLE MACRO=SILENT_MODE VARIABLE=current_mode VALUE='"{saved_mode}"'

#####################################################################
#  MACROS DE CONVENIÊNCIA
#####################################################################

[gcode_macro STEALTH_MODE]
description: Ativa modo silencioso (StealthChop)
gcode:
    SILENT_MODE MODE=stealth

[gcode_macro PERFORMANCE_MODE]
description: Ativa modo performance (SpreadCycle)
gcode:
    SILENT_MODE MODE=spread

[gcode_macro QUERY_SILENT_MODE]
description: Mostra o modo atual
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set current = svv.silent_mode|default("stealth") %}
    
    {% if current == "stealth" %}
        {action_respond_info("Modo atual: SILENCIOSO (StealthChop)")}
    {% else %}
        {action_respond_info("Modo atual: PERFORMANCE (SpreadCycle)")}
    {% endif %}
